      <stop stop-color="#f4efe5"/>
      <stop offset=".55" stop-color="#eadfce"/>
      <stop offset="1" stop-color="#dfd1bd"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#5d5141" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#paper)"/>
